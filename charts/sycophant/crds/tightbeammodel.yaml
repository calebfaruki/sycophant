apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tightbeammodels.tightbeam.dev
spec:
  group: tightbeam.dev
  names:
    kind: TightbeamModel
    plural: tightbeammodels
    singular: tightbeammodel
    shortNames:
      - tbm
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - provider
                - model
                - secretName
                - image
              properties:
                provider:
                  type: string
                model:
                  type: string
                secretName:
                  type: string
                maxTokens:
                  type: integer
                  default: 8192
                image:
                  type: string
                idleTimeout:
                  type: integer
                  default: 300
                description:
                  type: string
                  default: ""
      additionalPrinterColumns:
        - name: Provider
          type: string
          jsonPath: .spec.provider
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Image
          type: string
          jsonPath: .spec.image
