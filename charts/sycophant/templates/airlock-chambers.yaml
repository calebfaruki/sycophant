{{- range $name, $spec := .Values.chambers }}
---
apiVersion: airlock.dev/v1
kind: AirlockChamber
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
spec:
  {{- if $spec.image }}
  image: {{ $spec.image }}
  {{- end }}
  {{- if $spec.credentials }}
  credentials:
    {{- toYaml $spec.credentials | nindent 4 }}
  {{- end }}
  {{- if $spec.egress }}
  egress:
    {{- toYaml $spec.egress | nindent 4 }}
  {{- end }}
  keepalive: {{ $spec.keepalive | default false }}
{{- end }}
