{{- range $name, $spec := .Values.chambers }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: airlock-chamber-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
    airlock.dev/chamber: {{ $name }}
spec:
  endpointSelector:
    matchLabels:
      airlock.dev/chamber: {{ $name }}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: airlock-controller
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    {{- if $spec.egress }}
    {{- range $spec.egress }}
    {{- if eq .host "localhost" }}
    - toEntities:
        - localhost
      toPorts:
        - ports:
            - port: {{ .port | quote }}
              protocol: TCP
    {{- else }}
    - toFQDNs:
        - matchName: {{ .host | quote }}
      toPorts:
        - ports:
            - port: {{ .port | quote }}
              protocol: TCP
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-airlock-controller-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: airlock-controller
      app.kubernetes.io/part-of: sycophant
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: workspace
            app.kubernetes.io/part-of: sycophant
        - matchLabels:
            app.kubernetes.io/component: airlock-job
            app.kubernetes.io/part-of: sycophant
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
