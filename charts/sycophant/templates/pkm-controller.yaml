---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sycophant-pkm-data
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pkm-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
    app.kubernetes.io/name: pkm-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pkm-controller
      app.kubernetes.io/part-of: sycophant
  template:
    metadata:
      labels:
        {{- include "sycophant.labels" . | nindent 8 }}
        app.kubernetes.io/component: pkm-controller
        app.kubernetes.io/name: pkm-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-pkm-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      initContainers:
        - name: pkm-bootstrap
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /data/agents
              for src in /sources/agents/*; do
                if [ -d "$src" ]; then
                  agent=$(basename "$src")
                  mkdir -p "/data/agents/$agent"
                  cp -r "$src"/. "/data/agents/$agent/"
                fi
              done
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: pkm-data
              mountPath: /data
            {{- range $name, $agent := .Values.agents }}
            - name: source-{{ $name }}
              mountPath: /sources/agents/{{ $name }}
              readOnly: true
            {{- end }}
      containers:
        - name: pkm-controller
          image: "{{ .Values.pkm.image }}:{{ .Values.pkm.tag }}"
          imagePullPolicy: {{ .Values.pkm.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: PKM_DIR
              value: "/etc/pkm"
            - name: PKM_GRPC_ADDR
              value: "0.0.0.0:9090"
          ports:
            - name: grpc
              containerPort: 9090
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: pkm-data
              mountPath: /etc/pkm
      volumes:
        - name: pkm-data
          persistentVolumeClaim:
            claimName: sycophant-pkm-data
        {{- range $name, $agent := .Values.agents }}
        - name: source-{{ $name }}
          configMap:
            name: sycophant-prompt-{{ $name }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: pkm-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app.kubernetes.io/name: pkm-controller
    app.kubernetes.io/part-of: sycophant
