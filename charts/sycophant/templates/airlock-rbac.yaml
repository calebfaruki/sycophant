apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-airlock-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-airlock-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["airlock.dev"]
    resources: ["airlockchambers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["airlock.dev"]
    resources: ["airlockchambers/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-airlock-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-airlock-controller
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-airlock-controller
  apiGroup: rbac.authorization.k8s.io
