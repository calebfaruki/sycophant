{{- if .Capabilities.APIVersions.Has "kyverno.io/v1/ClusterPolicy" }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ .Release.Name }}-protect-security
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: protect-network-policy
      match:
        any:
          - resources:
              kinds:
                - NetworkPolicy
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          NetworkPolicy in sycophant namespace {{ .Release.Namespace }}
          is protected. Only Helm chart upgrades can modify it.
        deny: {}
    - name: protect-cilium-network-policy
      match:
        any:
          - resources:
              kinds:
                - CiliumNetworkPolicy
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          CiliumNetworkPolicy in sycophant namespace {{ .Release.Namespace }}
          is protected. Only Helm chart upgrades can modify it.
        deny: {}
    - name: protect-self
      match:
        any:
          - resources:
              kinds:
                - ClusterPolicy
              names:
                - "{{ .Release.Name }}-protect-security"
              operations:
                - UPDATE
                - DELETE
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          ClusterPolicy {{ .Release.Name }}-protect-security is
          self-protected. Only Helm chart upgrades can modify it.
        deny: {}
    - name: protect-rbac
      match:
        any:
          - resources:
              kinds:
                - Role
                - RoleBinding
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          RBAC resources in sycophant namespace {{ .Release.Namespace }}
          are protected. Only Helm chart upgrades can modify them.
        deny: {}
    - name: protect-airlock-bindings
      match:
        any:
          - resources:
              kinds:
                - ConfigMap
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
              selector:
                matchLabels:
                  sycophant.io/type: airlock-bindings
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          The airlock-bindings ConfigMap in namespace {{ .Release.Namespace }}
          is protected. Only Helm chart upgrades can modify it.
        deny: {}
    - name: protect-workspace-service-accounts
      match:
        any:
          - resources:
              kinds:
                - ServiceAccount
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
              selector:
                matchLabels:
                  sycophant.io/type: workspace-sa
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          Workspace ServiceAccounts in namespace {{ .Release.Namespace }}
          are protected. Only Helm chart upgrades can modify them.
        deny: {}
    - name: restrict-tightbeam-job-labels
      match:
        any:
          - resources:
              kinds:
                - Job
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - llm-job
                      - channel-job
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
          - subjects:
              - kind: ServiceAccount
                name: {{ .Release.Name }}-controller
                namespace: {{ .Release.Namespace }}
      validate:
        message: >-
          Only the tightbeam controller can create jobs with
          llm-job or channel-job component labels in namespace
          {{ .Release.Namespace }}.
        deny: {}
    - name: restrict-airlock-job-labels
      match:
        any:
          - resources:
              kinds:
                - Job
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - airlock-job
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
          - subjects:
              - kind: ServiceAccount
                name: {{ .Release.Name }}-airlock-controller
                namespace: {{ .Release.Namespace }}
      validate:
        message: >-
          Only the airlock controller can create jobs with
          airlock-job component labels in namespace
          {{ .Release.Namespace }}.
        deny: {}
    - name: protect-prompt-configmaps
      match:
        any:
          - resources:
              kinds:
                - ConfigMap
              namespaces:
                - "{{ .Release.Namespace }}"
              operations:
                - UPDATE
                - DELETE
              selector:
                matchLabels:
                  sycophant.io/type: prompt
      exclude:
        any:
          - clusterRoles:
              - {{ .Release.Name }}-chart-admin
              - cluster-admin
      validate:
        message: >-
          Prompt ConfigMaps in sycophant namespace {{ .Release.Namespace }}
          are protected. Only Helm chart upgrades can modify them.
        deny: {}
{{- end }}
