{{- range $name, $ws := .Values.workspaces }}
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: {{ $name }}
  labels:
    {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 4 }}
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 8 }}
      annotations:
        dev.gvisor.spec.mount.workspace-socket.share: "pod"
        dev.gvisor.spec.mount.workspace-socket.type: "tmpfs"
        dev.gvisor.spec.mount.workspace-socket.options: "rw"
    spec:
      runtimeClassName: gvisor
      serviceAccountName: sa-{{ $name }}
      tolerations:
        - key: sycophant.io/workload
          operator: Equal
          value: workspace
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: workspace
                    app.kubernetes.io/part-of: sycophant
                    app.kubernetes.io/instance: {{ $.Release.Name }}
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: transponder
          image: "{{ $.Values.transponder.image }}:{{ $.Values.transponder.tag }}"
          imagePullPolicy: {{ $.Values.transponder.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: "500m"
              memory: 256Mi
          env:
            - name: TIGHTBEAM_CONTROLLER_ADDR
              value: "http://tightbeam-controller.{{ $.Release.Namespace }}.svc:9090"
            - name: AIRLOCK_CONTROLLER_ADDR
              value: "http://airlock-controller.{{ $.Release.Namespace }}.svc:9090"
            - name: PKM_CONTROLLER_ADDR
              value: "http://pkm-controller.{{ $.Release.Namespace }}.svc:9090"
            - name: WORKSPACE_TOOLS_SOCKET
              value: "/run/workspace/tools.sock"
          volumeMounts:
            - name: workspace-socket
              mountPath: /run/workspace

        - name: workspace-tools
          image: "{{ $ws.image }}:{{ $ws.tag }}"
          imagePullPolicy: {{ $ws.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: WORKSPACE_TOOLS_SOCKET
              value: "/run/workspace/tools.sock"
            - name: HOME
              value: "/home/agent"
          readinessProbe:
            exec:
              command: ["test", "-S", "/run/workspace/tools.sock"]
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["test", "-S", "/run/workspace/tools.sock"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: workspace-socket
              mountPath: /run/workspace
            - name: workspace-data
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            - name: agent-home
              mountPath: /home/agent
          workingDir: /workspace

      volumes:
        - name: workspace-socket
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: agent-home
          emptyDir: {}
        - name: workspace-data
          persistentVolumeClaim:
            claimName: {{ $name }}-workspace-data
{{- end }}
