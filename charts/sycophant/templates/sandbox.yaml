{{- range $name, $ws := .Values.workspaces }}
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: {{ $name }}
  labels:
    {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 4 }}
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 8 }}
    spec:
      runtimeClassName: gvisor
      serviceAccountName: sa-{{ $name }}
      tolerations:
        - key: sycophant.io/workload
          operator: Equal
          value: workspace
          effect: NoSchedule
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: tightbeam-controller
                  app.kubernetes.io/instance: {{ $.Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: transponder
          image: "{{ $.Values.transponder.image }}:{{ $.Values.transponder.tag }}"
          imagePullPolicy: {{ $.Values.transponder.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: "500m"
              memory: 256Mi
          env:
            - name: TIGHTBEAM_CONTROLLER_ADDR
              value: "http://tightbeam-controller.{{ $.Release.Namespace }}.svc:9090"
            - name: AIRLOCK_CONTROLLER_ADDR
              value: "http://airlock-controller.{{ $.Release.Namespace }}.svc:9090"
{{- if $ws.instructions }}
          volumeMounts:
            - name: mainframe
              mountPath: /etc/mainframe
              subPath: {{ $name }}
              readOnly: true
{{- end }}

        - name: mainframe-runtime
          image: "{{ $ws.image }}:{{ $ws.tag }}"
          imagePullPolicy: {{ $ws.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: HOME
              value: "/home/agent"
          readinessProbe:
            exec:
              command: ["nc", "-z", "127.0.0.1", "50051"]
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["nc", "-z", "127.0.0.1", "50051"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: workspace-data
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            - name: agent-home
              mountPath: /home/agent
{{- if $ws.instructions }}
            - name: mainframe
              mountPath: /etc/mainframe
              subPath: {{ $name }}
              readOnly: true
{{- end }}
            - name: conversation-log
              mountPath: /var/log/conversation
              subPath: {{ $name }}
              readOnly: true
          workingDir: /workspace

      volumes:
        - name: tmp
          emptyDir: {}
        - name: agent-home
          emptyDir: {}
        - name: workspace-data
          persistentVolumeClaim:
            claimName: {{ $name }}-workspace-data
{{- if $ws.instructions }}
        - name: mainframe
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-mainframe-data
            readOnly: true
{{- end }}
        - name: conversation-log
          persistentVolumeClaim:
            claimName: tightbeam-controller-logs
            readOnly: true
{{- end }}
