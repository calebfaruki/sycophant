{{- range $name, $spec := .Values.tools }}
---
apiVersion: airlock.dev/v1
kind: AirlockTool
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
spec:
  chamber: {{ $spec.chamber }}
  description: {{ $spec.description | quote }}
  image: {{ $spec.image }}
  command: {{ $spec.command | quote }}
  {{- if $spec.maxCalls }}
  maxCalls: {{ $spec.maxCalls }}
  {{- end }}
{{- end }}
