---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-tightbeam-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: tightbeam-controller
      app.kubernetes.io/part-of: sycophant
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: workspace
            app.kubernetes.io/part-of: sycophant
        - matchLabels:
            app.kubernetes.io/component: llm-job
            app.kubernetes.io/part-of: sycophant
        - matchLabels:
            app.kubernetes.io/component: channel-job
            app.kubernetes.io/part-of: sycophant
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-tightbeam-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: tightbeam-controller
      app.kubernetes.io/part-of: sycophant
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
