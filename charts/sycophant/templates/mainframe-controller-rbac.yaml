apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-mainframe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mainframe-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-mainframe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mainframe-controller
rules:
  - apiGroups: ["mainframe.dev"]
    resources: ["mainframes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["mainframe.dev"]
    resources: ["mainframes/status"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-mainframe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mainframe-controller
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-mainframe-controller
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-mainframe-controller
  apiGroup: rbac.authorization.k8s.io
