{{- if eq (default "local" .Values.mainframe.adapter) "local" }}
{{- if not .Values.mainframe.local.hostPath }}
{{- fail "mainframe.adapter=local requires mainframe.local.hostPath to be set" }}
{{- end }}
---
# Mainframe local-FS adapter: cluster-scoped PV with hostPath source.
# The Sandbox VAP (sandbox-vap.yaml) prohibits hostPath in podTemplate
# specs; routing the same path through a PV+PVC pair keeps the Sandbox
# spec compliant while preserving operator-time authority over which
# host path is exposed. PV creation requires cluster-admin RBAC, a
# stronger gate than Sandbox-create. See decision 006.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-mainframe
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mainframe
spec:
  capacity:
    storage: {{ .Values.mainframe.local.capacity | default "1Gi" }}
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.mainframe.local.storageClass | default "" | quote }}
  hostPath:
    path: {{ .Values.mainframe.local.hostPath | quote }}
    type: Directory
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ .Release.Name }}-mainframe
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-mainframe
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mainframe
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: {{ .Values.mainframe.local.capacity | default "1Gi" }}
  storageClassName: {{ .Values.mainframe.local.storageClass | default "" | quote }}
  volumeName: {{ .Release.Name }}-mainframe
{{- end }}
