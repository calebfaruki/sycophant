---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tightbeam-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
    app.kubernetes.io/name: tightbeam-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tightbeam-controller
      app.kubernetes.io/part-of: sycophant
  template:
    metadata:
      labels:
        {{- include "sycophant.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller
        app.kubernetes.io/name: tightbeam-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: controller
          image: "{{ .Values.controller.image }}:{{ .Values.controller.tag }}"
          imagePullPolicy: {{ .Values.controller.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: TIGHTBEAM_NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: TIGHTBEAM_CONTROLLER_ADDR
              value: "http://tightbeam-controller.{{ .Release.Namespace }}.svc:9090"
            - name: TIGHTBEAM_LLM_JOB_IMAGE
              value: "{{ .Values.controller.llmJobImage }}"
          ports:
            - name: grpc
              containerPort: 9090
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: logs
              mountPath: /var/log/tightbeam
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: tightbeam-controller-logs
---
apiVersion: v1
kind: Service
metadata:
  name: tightbeam-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app.kubernetes.io/name: tightbeam-controller
    app.kubernetes.io/part-of: sycophant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tightbeam-controller-logs
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
