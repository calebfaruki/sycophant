{{- range $name, $spec := .Values.providers }}
---
apiVersion: tightbeam.dev/v1
kind: TightbeamProvider
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
spec:
  format: {{ $spec.format }}
  {{- if $spec.baseUrl }}
  baseUrl: {{ $spec.baseUrl }}
  {{- end }}
  secret:
    name: {{ $spec.secret.name }}
    {{- if $spec.secret.key }}
    key: {{ $spec.secret.key }}
    {{- end }}
{{- end }}
