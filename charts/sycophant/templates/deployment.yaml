{{- range $name, $ws := .Values.workspaces }}
{{- $needsRouter := include "sycophant.needsRouter" $ws }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/part-of: sycophant
  template:
    metadata:
      labels:
        {{- include "sycophant.workspaceLabels" (dict "context" $ "name" $name) | nindent 8 }}
    spec:
      containers:
        - name: transponder
          image: "{{ $.Values.transponder.image }}:{{ $.Values.transponder.tag }}"
          imagePullPolicy: {{ $.Values.transponder.pullPolicy | default "IfNotPresent" }}
          env:
            - name: TIGHTBEAM_CONTROLLER_ADDR
              value: "http://sycophant-controller.{{ $.Release.Namespace }}.svc:9090"
            - name: WORKSPACE_TOOLS_SOCKET
              value: "/run/workspace/tools.sock"
            - name: AGENT_DIR
              value: "/etc/agents"
            - name: AIRLOCK_CONTROLLER_ADDR
              value: "http://airlock-controller.{{ $.Release.Namespace }}.svc:9090"
          volumeMounts:
            - name: workspace-socket
              mountPath: /run/workspace
          {{- range $agent := $ws.agents | default list }}
            - name: agent-{{ $agent.name }}
              mountPath: /etc/agents/{{ $agent.name }}
              readOnly: true
          {{- end }}
          {{- if $needsRouter }}
            - name: agent-router
              mountPath: /etc/agents/router
              readOnly: true
          {{- end }}

        - name: workspace-tools
          image: "{{ $ws.image }}:{{ $ws.tag }}"
          imagePullPolicy: {{ $ws.pullPolicy | default "IfNotPresent" }}
          env:
            - name: WORKSPACE_TOOLS_SOCKET
              value: "/run/workspace/tools.sock"
          readinessProbe:
            exec:
              command: ["nc", "-zU", "/run/workspace/tools.sock"]
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["nc", "-zU", "/run/workspace/tools.sock"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: workspace-socket
              mountPath: /run/workspace
            - name: workspace-data
              mountPath: /workspace
          workingDir: /workspace

      volumes:
        - name: workspace-socket
          emptyDir: {}
        - name: workspace-data
          persistentVolumeClaim:
            claimName: {{ $name }}-workspace-data
      {{- range $agent := $ws.agents | default list }}
        - name: agent-{{ $agent.name }}
          configMap:
            name: sycophant-agent-{{ $name }}-{{ $agent.name }}
      {{- end }}
      {{- if $needsRouter }}
        - name: agent-router
          configMap:
            name: sycophant-agent-{{ $name }}-router
      {{- end }}
{{- end }}
