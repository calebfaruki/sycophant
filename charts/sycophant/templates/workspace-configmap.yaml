{{- range $name, $ws := .Values.workspaces }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sycophant-workspace-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
    sycophant.io/type: workspace
    sycophant.io/workspace: {{ $name }}
data:
  {{- range $agent := $ws.agents }}
  {{ $agent }}: {{ (index $.Values.agents $agent).model | quote }}
  {{- end }}
  {{- if gt (len $ws.agents) 1 }}
  router: {{ required (printf "workspace %s has multiple prompts but no routerModel" $name) $ws.routerModel | quote }}
  {{- end }}
{{- end }}
