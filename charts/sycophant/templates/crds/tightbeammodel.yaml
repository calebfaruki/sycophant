apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tightbeammodels.tightbeam.dev
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: tightbeam.dev
  names:
    kind: TightbeamModel
    plural: tightbeammodels
    singular: tightbeammodel
    shortNames:
      - tbm
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - format
                - model
                - baseUrl
              properties:
                format:
                  type: string
                model:
                  type: string
                baseUrl:
                  type: string
                thinking:
                  type: string
                  enum: ["low", "medium", "high"]
                secret:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    env:
                      type: string
                    file:
                      type: string
          x-kubernetes-validations:
            - rule: "!has(self.spec.secret) || !has(self.spec.secret.env) || !has(self.spec.secret.file)"
              message: "secret.env and secret.file are mutually exclusive"
      additionalPrinterColumns:
        - name: Format
          type: string
          jsonPath: .spec.format
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Thinking
          type: string
          jsonPath: .spec.thinking
