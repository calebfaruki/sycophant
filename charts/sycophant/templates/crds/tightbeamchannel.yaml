apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tightbeamchannels.tightbeam.dev
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: tightbeam.dev
  names:
    kind: TightbeamChannel
    plural: tightbeamchannels
    singular: tightbeamchannel
    shortNames:
      - tbc
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - type
                - secretName
                - image
              properties:
                type:
                  type: string
                secretName:
                  type: string
                image:
                  type: string
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
