apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tightbeamproviders.tightbeam.dev
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: tightbeam.dev
  names:
    kind: TightbeamProvider
    plural: tightbeamproviders
    singular: tightbeamprovider
    shortNames:
      - tbp
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - format
                - secret
              properties:
                format:
                  type: string
                  enum: ["anthropic", "openai", "gemini"]
                baseUrl:
                  type: string
                secret:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    key:
                      type: string
      additionalPrinterColumns:
        - name: Format
          type: string
          jsonPath: .spec.format
