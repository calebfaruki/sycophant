apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: airlockchambers.airlock.dev
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: airlock.dev
  names:
    categories: []
    kind: AirlockChamber
    plural: airlockchambers
    shortNames: []
    singular: airlockchamber
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.keepalive
      name: Keepalive
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AirlockChamberSpec via `CustomResource`
        properties:
          spec:
            properties:
              credentials:
                items:
                  properties:
                    env:
                      nullable: true
                      type: string
                    file:
                      nullable: true
                      type: string
                    secret:
                      type: string
                  required:
                  - secret
                  type: object
                type: array
              egress:
                items:
                  properties:
                    host:
                      type: string
                    port:
                      format: uint16
                      maximum: 65535.0
                      minimum: 0.0
                      type: integer
                  required:
                  - host
                  - port
                  type: object
                type: array
              image:
                nullable: true
                type: string
              keepalive:
                default: false
                type: boolean
            type: object
        required:
        - spec
        title: AirlockChamberValidated
        type: object
        x-kubernetes-validations:
        - rule: '!has(self.spec.credentials) || self.spec.credentials.all(c, (has(c.env) && !has(c.file)) || (!has(c.env) && has(c.file)))'
    served: true
    storage: true
    subresources: {}
