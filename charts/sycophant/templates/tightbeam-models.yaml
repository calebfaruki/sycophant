{{- range $name, $spec := .Values.models }}
---
apiVersion: tightbeam.dev/v1
kind: TightbeamModel
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sycophant.labels" $ | nindent 4 }}
spec:
  providerRef:
    name: {{ $spec.providerRef.name }}
  model: {{ $spec.model }}
  {{- if $spec.params }}
  params:
    {{- toYaml $spec.params | nindent 4 }}
  {{- end }}
{{- end }}
