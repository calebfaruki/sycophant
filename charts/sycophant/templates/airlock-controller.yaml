---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airlock-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
    app.kubernetes.io/name: airlock-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airlock-controller
      app.kubernetes.io/part-of: sycophant
  template:
    metadata:
      labels:
        {{- include "sycophant.labels" . | nindent 8 }}
        app.kubernetes.io/component: airlock-controller
        app.kubernetes.io/name: airlock-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-airlock-controller
      containers:
        - name: controller
          image: "{{ .Values.airlock.image }}:{{ .Values.airlock.tag }}"
          imagePullPolicy: {{ .Values.airlock.pullPolicy | default "IfNotPresent" }}
          args:
            - "--port"
            - "9090"
            - "--namespace"
            - "{{ .Release.Namespace }}"
            - "--controller-addr"
            - "http://airlock-controller.{{ .Release.Namespace }}.svc:9090"
          ports:
            - name: grpc
              containerPort: 9090
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: airlock-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app.kubernetes.io/name: airlock-controller
    app.kubernetes.io/part-of: sycophant
