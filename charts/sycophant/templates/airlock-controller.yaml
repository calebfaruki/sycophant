---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airlock-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
    app.kubernetes.io/name: airlock-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airlock-controller
      app.kubernetes.io/part-of: sycophant
  template:
    metadata:
      labels:
        {{- include "sycophant.labels" . | nindent 8 }}
        app.kubernetes.io/component: airlock-controller
        app.kubernetes.io/name: airlock-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-airlock-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: controller
          image: "{{ .Values.airlock.image }}:{{ .Values.airlock.tag }}"
          imagePullPolicy: {{ .Values.airlock.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args:
            - "--port"
            - "9090"
            - "--namespace"
            - "{{ .Release.Namespace }}"
            - "--controller-addr"
            - "http://airlock-controller.{{ .Release.Namespace }}.svc:9090"
            - "--bindings-file"
            - "/etc/sycophant/airlock-bindings/bindings.yaml"
          ports:
            - name: grpc
              containerPort: 9090
          volumeMounts:
            - name: airlock-bindings
              mountPath: /etc/sycophant/airlock-bindings
              readOnly: true
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: airlock-bindings
          configMap:
            name: airlock-bindings
---
apiVersion: v1
kind: Service
metadata:
  name: airlock-controller
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: airlock-controller
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app.kubernetes.io/name: airlock-controller
    app.kubernetes.io/part-of: sycophant
