apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pkm-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pkm-tokenreview
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pkm-tokenreview
  labels:
    {{- include "sycophant.labels" . | nindent 4 }}
    app.kubernetes.io/component: pkm-controller
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-pkm-controller
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-pkm-tokenreview
  apiGroup: rbac.authorization.k8s.io
