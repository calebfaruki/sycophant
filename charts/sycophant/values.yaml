# Tightbeam controller -- LLM communications.
# Manages TightbeamModel CRDs, creates ephemeral LLM Jobs.
controller:
  image: ghcr.io/calebfaruki/tightbeam-controller
  tag: "latest"
  pullPolicy: Always
  llmJobImage: ghcr.io/calebfaruki/tightbeam-llm-job:latest

# Airlock controller -- tool execution.
# Watches AirlockChamber CRDs, discovers tools from OCI image labels.
airlock:
  image: ghcr.io/calebfaruki/airlock-controller
  tag: "latest"
  pullPolicy: Always

# Transponder -- agent runtime (pure router).
# Routes between tightbeam (LLM), airlock (tools), and workspace
# local MCP server. Stateless.
transponder:
  image: ghcr.io/calebfaruki/sycophant-transponder
  tag: "latest"
  pullPolicy: Always

# Workspaces -- one entry per agent workspace.
# Each workspace becomes a pod with transponder + workspace-tools
# containers, a PVC for working files, and a NetworkPolicy
# restricting egress to tightbeam and airlock controllers only.
#
# Schema:
#   <name>:
#     image: <workspace-tools image>    (required)
#     tag: <image tag>                  (required)
#     pullPolicy: <IfNotPresent|Always|Never>  (default: IfNotPresent)
#     agents:                           (required, list)
#       - name: <agent-name>            (required)
#         description: <what it does>   (optional, used by auto-generated
#                                        router when multiple agents exist)
#
# Example:
#   workspaces:
#     dev:
#       image: ghcr.io/myorg/workspace-tools
#       tag: "1.0"
#       agents:
#         - name: coder
#           description: "Writes and runs code"
#         - name: reviewer
#           description: "Reviews code for correctness and security"
workspaces: {}

# Chambers -- execution environments for tool Jobs.
# Each chamber defines the workspace mount, credentials, and
# network egress allowed for Jobs that run inside it.
# A matching CiliumNetworkPolicy is rendered for each chamber.
#
# Schema:
#   <name>:
#     image: <OCI image with dev.airlock.tools label>  (optional)
#     workspace: <PVC name>              (required)
#     workspaceMode: readOnly|readWrite  (required)
#     workspaceMountPath: <path>         (default: /workspace)
#     keepalive: <bool>                  (default: false)
#     credentials:                       (optional, list)
#       - secret: <secret name>          (required)
#         key: <key in secret>           (optional)
#         env: <env var name>            (set env from secret key)
#         file: <file path>             (mount secret key as file)
#     egress:                            (optional, list)
#       - host: <hostname>              (required)
#         port: <port>                  (required)
#
# Example:
#   chambers:
#     git-ops:
#       image: ghcr.io/calebfaruki/airlock-git:latest
#       workspace: workspace-data
#       workspaceMode: readWrite
#       workspaceMountPath: /workspace
#       credentials:
#         - secret: git-ssh-key
#           key: id_ed25519
#           file: /root/.ssh/id_ed25519
#       egress:
#         - host: github.com
#           port: 22
chambers: {}

# Models -- LLM provider configurations.
# Each model defines the provider format, model name, API endpoint,
# and optional secret for authentication.
#
# Schema:
#   <name>:
#     format: <anthropic|openai>           (required)
#     model: <model identifier>            (required)
#     baseUrl: <API endpoint URL>          (required)
#     thinking: <low|medium|high>          (optional)
#     secret:                              (optional)
#       name: <secret name>               (required)
#       env: <env var name>               (mount secret as env var)
#       file: <file path>                 (mount secret as file)
#
# Example:
#   models:
#     default:
#       format: anthropic
#       model: claude-sonnet-4-20250514
#       baseUrl: https://api.anthropic.com/v1
#       secret:
#         name: sycophant-llm-anthropic
#         env: API_KEY
models: {}
