# Tightbeam controller -- LLM communications.
# Manages TightbeamModel CRDs, creates ephemeral LLM Jobs.
controller:
  image: ghcr.io/calebfaruki/tightbeam-controller
  tag: "latest"
  pullPolicy: Always
  llmJobImage: ghcr.io/calebfaruki/tightbeam-llm-job:latest

# Airlock controller -- tool execution.
# Watches AirlockChamber CRDs, discovers tools from OCI image labels.
airlock:
  image: ghcr.io/calebfaruki/airlock-controller
  tag: "latest"
  pullPolicy: Always

# Transponder -- agent runtime (pure router).
# Routes between tightbeam (LLM), airlock (tools), and the
# in-pod mainframe-runtime (local MCP). Stateless.
transponder:
  image: ghcr.io/calebfaruki/sycophant-transponder
  tag: "latest"
  pullPolicy: Always

# Mainframe -- subsystem that serves principal-authored content to workspace
# pods at /etc/mainframe. Decisions 006-008: the workspace runtime reads
# AGENTS.md and supporting markdown from that mount. Stage 4: per-workspace
# mainframe; the workspace-level config lives under workspaces.<name>.instructions
# (see below). This block holds subsystem-level config only.
mainframe:
  controller:
    image: ghcr.io/calebfaruki/mainframe-controller
    tag: latest
    pullPolicy: Always
    # PVC capacity for the controller-owned data volume. Sized for the sum of
    # all workspace mainframe payloads; expand as principal content grows.
    dataCapacity: "10Gi"
  # Periodic re-pull cadence in seconds. Applies to every workspace's mainframe.
  refreshIntervalSeconds: 60
  # Versitygw -- bundled S3 gateway used when a workspace's instructions: is a
  # local path string. The chart deploys one Versitygw per such workspace,
  # backed by the configured local folder. Apache 2.0, stateless.
  versitygw:
    image: versity/versitygw
    tag: "v1.0.18"
    pullPolicy: IfNotPresent

# Workspaces -- one entry per agent workspace.
# Each workspace becomes a pod with transponder + mainframe-runtime
# containers, a PVC for working files, and a NetworkPolicy
# restricting egress to tightbeam and airlock controllers only.
#
# Schema:
#   <name>:
#     image: <mainframe-runtime image>  (required)
#     tag: <image tag>                  (required)
#     pullPolicy: <IfNotPresent|Always|Never>  (default: IfNotPresent)
#     chambers:                         (optional, list of chamber names)
#       - <chamber-name>
#     instructions:                     (optional)
#       # Source for the agent's principal-authored content (AGENTS.md,
#       # skills, sub-agent definitions, knowledge). Mounted read-only at
#       # /etc/mainframe inside the workspace pod.
#       #
#       # Two forms:
#       #   1. String — absolute local path. Chart provisions a per-workspace
#       #      Versitygw deployment backed by that folder; mainframe-controller
#       #      pulls from it like any S3 source.
#       #   2. Object — external S3 (R2 / AWS / Garage / etc.). Required:
#       #      endpoint, bucket, secretName. Optional: region, prefix.
#
# Example:
#   workspaces:
#     research:
#       image: ghcr.io/myorg/mainframe-runtime
#       tag: "1.0"
#       instructions: /Users/me/personal/research        # local path → bundled Versitygw
#     coding:
#       image: ghcr.io/myorg/mainframe-runtime
#       tag: "1.0"
#       instructions:                                     # external S3
#         endpoint: https://r2.example.com
#         bucket: coding-mainframe
#         secretName: coding-s3-creds
#         region: auto
#       chambers:
#         - git-ops
workspaces: {}

# Chambers -- execution environments for tool Jobs.
# Each chamber defines credentials and network egress allowed for Jobs
# that run inside it. The workspace PVC is mounted RW at /workspace
# (convention, not configurable). A matching CiliumNetworkPolicy is
# rendered for each chamber.
#
# Schema:
#   <name>:
#     image: <OCI image with dev.airlock.tools label>  (optional)
#     keepalive: <bool>                  (default: false)
#     credentials:                       (optional, list)
#       - secret: <secret name>          (required)
#         env: <env var name>            (set env from secret key)
#         file: <file path>             (mount secret key as file)
#     egress:                            (optional, list)
#       - host: <hostname>              (required)
#         port: <port>                  (required)
#
# Example:
#   chambers:
#     git-ops:
#       image: ghcr.io/calebfaruki/airlock-git:latest
#       credentials:
#         - secret: git-ssh-key
#           file: /root/.ssh/id_ed25519
#       egress:
#         - host: github.com
#           port: 22
chambers: {}

# Models -- LLM provider configurations.
# Each model defines the provider format, model name, API endpoint,
# and optional secret for authentication.
#
# Schema:
#   <name>:
#     format: <anthropic|openai>           (required)
#     model: <model identifier>            (required)
#     baseUrl: <API endpoint URL>          (required)
#     thinking: <low|medium|high>          (optional)
#     secret:                              (optional)
#       name: <secret name>               (required)
#       env: <env var name>               (mount secret as env var)
#       file: <file path>                 (mount secret as file)
#
# Example:
#   models:
#     default:
#       format: anthropic
#       model: claude-sonnet-4-20250514
#       baseUrl: https://api.anthropic.com/v1
#       secret:
#         name: sycophant-llm-anthropic
#         env: API_KEY
models: {}

# Channels -- messaging platform connections.
# Each channel defines a platform type, secret reference, and image.
# The controller creates a channel Job with the bot token mounted by kubelet.
#
# Schema:
#   <name>:
#     type: <discord|slack|telegram>      (required)
#     secretName: <secret name>           (required)
#     image: <channel job image>          (required)
#
# Example:
#   channels:
#     discord-bot:
#       type: discord
#       secretName: discord-bot-token
#       image: ghcr.io/calebfaruki/tightbeam-channel-discord:latest
channels: {}
