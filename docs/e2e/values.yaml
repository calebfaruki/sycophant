controller:
  image: tightbeam-controller
  tag: local
  pullPolicy: Never
  llmJobImage: tightbeam-llm-job:local

airlock:
  image: airlock-controller
  tag: local
  pullPolicy: Never

transponder:
  image: sycophant-transponder
  tag: local
  pullPolicy: Never

mainframe:
  adapter: local
  local:
    hostPath: /var/lib/sycophant/mainframe

workspaces:
  hello-world:
    image: sycophant-workspace-tools
    tag: local
    pullPolicy: Never
    chambers:
      - workspace-ro
      - ssh-secret
  multi-agent:
    image: sycophant-workspace-tools
    tag: local
    pullPolicy: Never
    chambers:
      - workspace-ro

chambers:
  workspace-ro:
    image: host.docker.internal:5555/airlock-git:latest
  ssh-secret:
    image: host.docker.internal:5555/airlock-ssh:latest

models:
  # default aliased to Haiku for the e2e (Mistral hit a tier-capacity limit
  # during testing). When Mistral capacity returns, swap default back to
  # Mistral or expose both via a separate alias.
  default:
    format: anthropic
    model: claude-haiku-4-5-20251001
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
      env: API_KEY
  mistral.small:
    format: openai
    model: mistral-small-latest
    baseUrl: https://api.mistral.ai/v1
    secret:
      name: sycophant-llm-mistral
      env: API_KEY
  anthropic.claude-haiku-4-5-20251001:
    format: anthropic
    model: claude-haiku-4-5-20251001
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
      env: API_KEY
  anthropic.claude-sonnet-4-20250514:
    format: anthropic
    model: claude-sonnet-4-20250514
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
      env: API_KEY
