controller:
  image: tightbeam-controller
  tag: local
  pullPolicy: Never
  llmJobImage: tightbeam-llm-job:local

airlock:
  image: airlock-controller
  tag: local
  pullPolicy: Never

transponder:
  image: sycophant-transponder
  tag: local
  pullPolicy: Never

mainframe:
  controller:
    image: mainframe-controller
    tag: local
    pullPolicy: Never
    dataCapacity: "1Gi"
  refreshIntervalSeconds: 30

workspaces:
  # Both workspaces use bundled Versitygw against a hostPath under the repo's
  # gitignored tmp/. The e2e focuses on local-mode coverage; external-S3
  # wiring is covered by helm-template + Rust unit tests in CI, not here.
  hello-world:
    image: sycophant-mainframe-runtime
    tag: local
    pullPolicy: Never
    instructions: /Users/calebfaruki/sycophant/tmp/hello-world-data
    chambers:
      - workspace-ro
      - ssh-secret
  multi-agent:
    image: sycophant-mainframe-runtime
    tag: local
    pullPolicy: Never
    instructions: /Users/calebfaruki/sycophant/tmp/multi-agent-data
    chambers:
      - workspace-ro

chambers:
  workspace-ro:
    image: k3d-registry.localhost:5555/airlock-git:latest
  ssh-secret:
    image: k3d-registry.localhost:5555/airlock-ssh:latest

providers:
  anthropic:
    format: anthropic
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
  mistral:
    format: openai
    baseUrl: https://api.mistral.ai/v1
    secret:
      name: sycophant-llm-mistral

models:
  # default aliased to Haiku for the e2e (Mistral hit a tier-capacity limit
  # during testing). When Mistral capacity returns, swap default back to
  # Mistral or expose both via a separate alias.
  default:
    providerRef: { name: anthropic }
    model: claude-haiku-4-5-20251001
  mistral.small:
    providerRef: { name: mistral }
    model: mistral-small-latest
  anthropic.claude-haiku-4-5-20251001:
    providerRef: { name: anthropic }
    model: claude-haiku-4-5-20251001
  anthropic.claude-sonnet-4-20250514:
    providerRef: { name: anthropic }
    model: claude-sonnet-4-20250514
