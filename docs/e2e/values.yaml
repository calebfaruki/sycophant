controller:
  image: tightbeam-controller
  tag: local
  pullPolicy: Never
  llmJobImage: tightbeam-llm-job:local

airlock:
  image: airlock-controller
  tag: local
  pullPolicy: Never

transponder:
  image: sycophant-transponder
  tag: local
  pullPolicy: Never

pkm:
  image: pkm-controller
  tag: local
  pullPolicy: Never

workspaces:
  hello-world:
    image: sycophant-workspace-tools
    tag: local
    pullPolicy: Never
    chambers:
      - workspace-ro
      - ssh-secret
  multi-agent:
    image: sycophant-workspace-tools
    tag: local
    pullPolicy: Never
    chambers:
      - workspace-ro

chambers:
  workspace-ro:
    image: host.docker.internal:5555/airlock-git:latest
  ssh-secret:
    image: host.docker.internal:5555/airlock-ssh:latest

agents:
  hello-world:
    model: anthropic.claude-haiku-4-5-20251001
    prompt:
      path: examples/prompts/hello-world
  alice:
    model: anthropic.claude-haiku-4-5-20251001
    description: "Friendly and creative. Good with brainstorming, explanations, and people questions."
    prompt:
      path: examples/prompts/alice
  bob:
    model: anthropic.claude-sonnet-4-20250514
    description: "Technical and precise. Good with code, debugging, and system design."
    prompt:
      path: examples/prompts/bob
  router:
    model: anthropic.claude-haiku-4-5-20251001
    description: "Routes user messages to the appropriate agent."
    prompt:
      path: examples/prompts/router

models:
  default:
    format: openai
    model: mistral-small-latest
    baseUrl: https://api.mistral.ai/v1
    secret:
      name: sycophant-llm-mistral
      env: API_KEY
  anthropic.claude-haiku-4-5-20251001:
    format: anthropic
    model: claude-haiku-4-5-20251001
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
      env: API_KEY
  anthropic.claude-sonnet-4-20250514:
    format: anthropic
    model: claude-sonnet-4-20250514
    baseUrl: https://api.anthropic.com/v1
    secret:
      name: sycophant-llm-anthropic
      env: API_KEY
