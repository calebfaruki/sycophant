name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: syco-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: syco-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@d1565eeb874f106d1696ad08faf835331133fe14 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p syco
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/syco ${{ matrix.artifact }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-containers:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact-suffix: linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact-suffix: linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@d1565eeb874f106d1696ad08faf835331133fe14 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build transponder
        run: cargo build --release --target ${{ matrix.target }} -p transponder
      - name: Build workspace-tools
        run: cargo build --release --target ${{ matrix.target }} -p workspace-tools
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: transponder-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/transponder
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workspace-tools-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/workspace-tools

  release:
    needs: [build-cli, build-containers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Sign artifacts
        run: |
          for f in artifacts/*; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --bundle "$f.bundle"
          done
      - uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: artifacts/*
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true
