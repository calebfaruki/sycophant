name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: syco-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: syco-darwin-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: syco-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: syco-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@d1565eeb874f106d1696ad08faf835331133fe14 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          echo '[target.aarch64-unknown-linux-musl]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p syco
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/syco ${{ matrix.artifact }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-k8s:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact-suffix: linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact-suffix: linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@d1565eeb874f106d1696ad08faf835331133fe14 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          echo '[target.aarch64-unknown-linux-musl]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build all container binaries
        run: |
          RUSTFLAGS='-C target-feature=+crt-static' cargo build --release --target ${{ matrix.target }} \
            -p tightbeam-controller -p tightbeam-llm-job -p airlock-controller -p airlock-runtime -p mainframe-controller -p transponder -p mainframe-runtime
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tightbeam-controller-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/tightbeam-controller
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tightbeam-llm-job-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/tightbeam-llm-job
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: transponder-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/transponder
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mainframe-runtime-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/mainframe-runtime
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: airlock-controller-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/airlock-controller
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: airlock-runtime-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/airlock-runtime
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mainframe-controller-${{ matrix.artifact-suffix }}
          path: target/${{ matrix.target }}/release/mainframe-controller

  release:
    needs: [build-cli, build-k8s]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Sign artifacts
        run: |
          for f in artifacts/*; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --bundle "$f.bundle"
          done
      - uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: artifacts/*
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-image:
    needs: [build-k8s]
    strategy:
      matrix:
        include:
          - binary: tightbeam-controller
            image: tightbeam-controller
          - binary: tightbeam-llm-job
            image: tightbeam-llm-job
          - binary: transponder
            image: sycophant-transponder
          - binary: mainframe-runtime
            image: sycophant-mainframe-runtime
          - binary: airlock-controller
            image: airlock-controller
          - binary: airlock-runtime
            image: airlock-runtime
          - binary: mainframe-controller
            image: mainframe-controller
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: artifacts
          file: build/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BINARY=${{ matrix.binary }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
