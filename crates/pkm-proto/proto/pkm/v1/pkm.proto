syntax = "proto3";
package pkm.v1;

import "tightbeam/v1/tightbeam.proto";

// PkmService: Personal Knowledge Manager controller.
//
// Owns routing policy: agent selection, prompt compilation, system message
// bundling. Transponder consults PKM per user message via the bidirectional
// ResolveTurn stream. PKM never holds provider credentials and never calls
// Tightbeam directly — all LLM dispatches go through Transponder, preserving
// the relay invariant from decision 005.
service PkmService {
  // Bidirectional stream, one invocation per user message.
  //
  // Transponder opens with UserMessage. PKM may yield zero or more
  // RunSystemTurn events; for each, Transponder runs the LLM call via
  // Tightbeam and replies with ReportSystemTurn. PKM terminates the stream
  // by yielding either RunAgentTurn (success) or ResolveError (failure).
  rpc ResolveTurn (stream TransponderEvent) returns (stream PkmEvent);
}

// Events Transponder sends to PKM during a ResolveTurn invocation.
message TransponderEvent {
  oneof event {
    UserMessage user_message = 1;
    ReportSystemTurn report_system_turn = 2;
  }
}

// Events PKM sends to Transponder during a ResolveTurn invocation.
message PkmEvent {
  oneof event {
    RunSystemTurn run_system_turn = 1;
    RunAgentTurn run_agent_turn = 2;
    ResolveError resolve_error = 3;
  }
}

// Transponder → PKM (opens stream): a user message arrived; resolve how
// to handle it. Same logical entity as tightbeam.v1.UserMessage at the
// Tightbeam → Transponder hop, with reply_channel dropped.
message UserMessage {
  repeated tightbeam.v1.ContentBlock content = 1;
  string sender = 2;
}

// PKM → Transponder: run this LLM call as the system turn. Transponder
// dispatches to Tightbeam with role=SYSTEM_AGENT and reports the
// structured response back via ReportSystemTurn. response_schema_json
// is the JSON schema the response must conform to.
message RunSystemTurn {
  string system_prompt = 1;
  repeated tightbeam.v1.Message messages = 2;
  optional string response_schema_json = 3;
}

// Transponder → PKM: the system turn finished. `response_json` carries the
// LLM's free-text body (the assistant message content). When the system turn
// requested a schema (RunSystemTurn.response_schema_json), `structured_json`
// carries the schema-validated output and PKM should prefer it.
message ReportSystemTurn {
  string response_json = 1;
  optional string structured_json = 2;
}

// PKM → Transponder (terminal success): run the agent turn with these
// inputs. Stream closes after this event. Note: agent-turn tools come
// from Transponder's tool router, not from PKM.
message RunAgentTurn {
  string agent_name = 1;
  string system_prompt = 2;
  repeated tightbeam.v1.Message system_messages = 3;
}

// PKM → Transponder (terminal failure): resolution failed. Stream closes
// after this event.
message ResolveError {
  int32 code = 1;
  string message = 2;
}
