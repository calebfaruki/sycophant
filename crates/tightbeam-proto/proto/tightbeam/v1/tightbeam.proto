syntax = "proto3";
package tightbeam.v1;

// --- Core types ---

message ContentBlock {
  oneof block {
    TextBlock text = 1;
    ImageBlock image = 2;
    ThinkingBlock thinking = 3;
  }
}

message TextBlock {
  string text = 1;
}

message ImageBlock {
  string media_type = 1;
  bytes data = 2;
}

message ThinkingBlock {
  string text = 1;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

message ToolCall {
  string id = 1;
  string name = 2;
  string input_json = 3;
}

message Message {
  string role = 1;
  repeated ContentBlock content = 2;
  repeated ToolCall tool_calls = 3;
  optional string tool_call_id = 4;
  optional bool is_error = 5;
}

enum StopReason {
  STOP_REASON_UNSPECIFIED = 0;
  END_TURN = 1;
  TOOL_USE = 2;
  MAX_TOKENS = 3;
}

// --- Controller service ---
//
// Single gRPC service. The controller is the only server.
// LLM Jobs, Channel Jobs, and Transponder connect as clients.

service TightbeamController {
  // LLM Job pulls work. Long-poll: controller holds the response open
  // until a turn is ready. The Job sets a gRPC deadline as its idle
  // timeout. No work before deadline = Job exits, kubelet cleans up.
  rpc GetTurn (GetTurnRequest) returns (TurnAssignment);

  // LLM Job streams response chunks back to the controller.
  rpc StreamTurnResult (stream TurnResultChunk) returns (TurnAck);

  // Transponder sends turns, receives streaming LLM response.
  rpc Turn (TurnRequest) returns (stream TurnEvent);

  // List available models (used by transponder/router for model selection).
  rpc ListModels (ListModelsRequest) returns (ListModelsResponse);

  // Channel Job bidirectional stream. Inbound user messages flow in,
  // agent responses flow out.
  rpc ChannelStream (stream ChannelInbound) returns (stream ChannelOutbound);

  // Transponder subscribes to receive inbound human messages.
  // Server-streaming: controller pushes messages as they arrive from channels.
  rpc Subscribe (SubscribeRequest) returns (stream UserMessage);
}

// --- LLM Job RPCs ---

message GetTurnRequest {
  string model_name = 1;
}

message TurnAssignment {
  optional string system = 1;
  repeated ToolDefinition tools = 2;
  repeated Message messages = 3;
  // RFC 7396-merged params blob (TightbeamModel.params with frontmatter
  // override applied). Opaque to sycophant; merged into provider request body.
  optional string params_json = 4;
}

message TurnResultChunk {
  oneof chunk {
    ContentDelta content_delta = 1;
    ToolUseStart tool_use_start = 2;
    ToolUseInput tool_use_input = 3;
    TurnComplete complete = 4;
    TurnError error = 5;
    TurnWarning warning = 6;
  }
}

message ContentDelta {
  string text = 1;
}

message ToolUseStart {
  string id = 1;
  string name = 2;
}

message ToolUseInput {
  string partial_json = 1;
}

message TurnComplete {
  StopReason stop_reason = 1;
  repeated ContentBlock content = 2;
  repeated ToolCall tool_calls = 3;
}

message TurnError {
  int32 code = 1;
  string message = 2;
}

// Reports a principal-supplied params field that was overwritten by sycophant
// because it is operator-bound (the managed-fields list per format).
message TurnWarning {
  string field = 1;
  string reason = 2;
}

message TurnAck {}

// --- Transponder RPCs ---

message TurnRequest {
  optional string system = 1;
  repeated ToolDefinition tools = 2;
  repeated Message messages = 3;
  optional string model = 5;
  optional string reply_channel = 6;
  // role tags conversation log entries. DELEGATE entries are scoped per
  // delegate call via correlation_id; orchestrator turns leave role unset.
  optional TurnRole role = 7;
  // Per-call correlation id for delegate turns. Set to the orchestrator's
  // tool_use_id so each delegate's entries can be tagged "delegate:<id>"
  // and scoped independently in history_for_provider. None for orchestrator
  // turns.
  optional string correlation_id = 9;
}

enum TurnRole {
  TURN_ROLE_UNSPECIFIED = 0;
  DELEGATE = 3;
}

message TurnEvent {
  oneof event {
    ContentDelta content_delta = 1;
    ToolUseStart tool_use_start = 2;
    ToolUseInput tool_use_input = 3;
    TurnComplete complete = 4;
    TurnError error = 5;
    TurnWarning warning = 6;
  }
}

// --- Model listing ---

message ListModelsRequest {}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string name = 1;
  string provider = 2;
  string model = 3;
  string description = 4;
}

// --- Channel Job RPCs ---

message ChannelInbound {
  oneof event {
    ChannelRegister register = 1;
    UserMessage user_message = 2;
  }
}

message ChannelRegister {
  string channel_type = 1;
  string channel_name = 2;
  optional string workspace = 3;
}

message ChannelOutbound {
  oneof command {
    ChannelSend send_message = 1;
  }
}

message ChannelSend {
  repeated ContentBlock content = 1;
}

// --- Subscribe RPCs ---

message SubscribeRequest {}

// UserMessage is the canonical "user said something" event. Flows from
// Channel Job → Tightbeam → Transponder; reply_channel is populated by
// Tightbeam so the transponder's response goes back to the right channel.
message UserMessage {
  repeated ContentBlock content = 1;
  string sender = 2;
  optional string reply_channel = 3;
}
